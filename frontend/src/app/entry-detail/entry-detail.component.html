<div *ngIf="entry">
  <h2>{{entry.title | uppercase}} Details</h2>
  <div><span>id: </span>{{entry.id}}</div>
  <div>
    <label for="entry-title">Entry name: </label>
    <input id="entry-title" [(ngModel)]="entry.title" placeholder="Entry name"/>
  </div>
  <!-- <button type="button" (click)="goBack()">go back</button> -->
</div>
