<div *ngIf="entry">
  <h2>{{entry.title}}</h2>
  <div>
    
    <label>{{entry.artist}}</label><br>
    <label>{{entry.year}}</label><br>
    <label>{{entry.genre}}</label><br>
  </div>
  <br>
  <div>
    <label> Listen Date: {{entry.listenDate}}</label><br>
    <label> Rating: {{entry.rating}}/5</label><br>
    <label> Review: {{entry.review}}</label><br>
  </div>

<div>
  <button type="button" (click)="goBack()">go back</button>
</div>
